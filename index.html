document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"53a8026b-c10a-421d-97ca-e91f525f2938\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    /* ======== Constructor Saúl SpA · Brand tokens ======== */\n    --ink:        #0F1216;     /* base dark canvas */\n    --ink-2:      #14181F;     /* card bg on dark */\n    --ink-3:      #1A1F28;     /* hover / secondary card */\n    --ink-line:   #232932;     /* borders on dark */\n    --ink-line-2: #2D3540;\n\n    --graphite:   #3A3D40;     /* brand graphite */\n    --graphite-2: #4D5155;\n\n    --white:      #ffffff;\n    --paper:      #F4F6F9;\n    --paper-2:    #E9EEF4;\n    --line:       #DDE3EC;\n    --line-2:     #C5CEDB;\n    --mute:       #6B7280;\n\n    --on-dark-1:  rgba(255,255,255,.92);\n    --on-dark-2:  rgba(255,255,255,.72);\n    --on-dark-3:  rgba(255,255,255,.55);\n    --on-dark-4:  rgba(255,255,255,.35);\n    --on-dark-line: rgba(255,255,255,.10);\n\n    --cyan:       #22BED6;\n    --cyan-2:     #1FA7C0;\n    --blue:       #176FC9;\n    --blue-2:     #125FB3;\n    --deep:       #1432B5;\n    --deep-2:     #0E2589;\n    --cyan-soft:  #DDF4F9;\n    --blue-soft:  #DEEAF8;\n\n    --wsp:        #25D366;\n    --wsp-dark:   #128C7E;\n    --gold:       #F4B233;\n\n    --display: \"Sora\", ui-sans-serif, system-ui, sans-serif;\n    --body:    \"Plus Jakarta Sans\", ui-sans-serif, system-ui, sans-serif;\n    --mono:    ui-monospace, \"SF Mono\", Menlo, monospace;\n\n    --r-sm: 10px;\n    --r-md: 16px;\n    --r-lg: 24px;\n    --r-xl: 32px;\n\n    --shadow-soft: 0 1px 0 rgba(0,0,0,.04), 0 14px 32px -16px rgba(0,0,0,.45);\n    --shadow-card: 0 1px 0 rgba(0,0,0,.04), 0 24px 60px -24px rgba(0,0,0,.5);\n    --shadow-glow: 0 24px 60px -18px rgba(34,190,214,.45);\n    --shadow-deep: 0 28px 64px -22px rgba(14,37,137,.65);\n\n    --grad-brand:    linear-gradient(180deg, var(--cyan) 0%, var(--blue) 50%, var(--deep) 100%);\n    --grad-brand-h:  linear-gradient(135deg, var(--cyan) 0%, var(--blue) 45%, var(--deep) 100%);\n    --grad-brand-flat: linear-gradient(90deg, var(--cyan) 0%, var(--blue) 50%, var(--deep) 100%);\n  }\n\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--ink);color:var(--white);font-family:var(--body);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  body{font-size:15.5px;line-height:1.55;font-weight:400}\n  a{color:inherit;text-decoration:none}\n  img{max-width:100%;display:block}\n  button{font-family:inherit;cursor:pointer}\n\n  .wrap{max-width:1280px;margin:0 auto;padding:0 28px}\n\n  /* ===== gradient text helper ===== */\n  .grad{background:var(--grad-brand-h);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}\n\n  /* ===== eyebrow ===== */\n  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:var(--body);font-size:12px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.14em}\n  .eyebrow::before{content:\"\";width:24px;height:2px;background:var(--grad-brand-flat);border-radius:2px}\n\n  /* ===== buttons ===== */\n  .btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--body);font-weight:600;font-size:14.5px;border:none;border-radius:999px;cursor:pointer;transition:transform .15s, box-shadow .15s, background .15s;text-decoration:none;height:52px;padding:0 8px 0 24px}\n  .btn:hover{transform:translateY(-1px)}\n  .btn .arr{width:38px;height:38px;border-radius:50%;margin-left:14px;display:grid;place-items:center;transition:transform .2s, background .2s}\n  .btn:hover .arr{transform:rotate(-45deg)}\n\n  .btn-grad{background:var(--grad-brand-h);color:#fff;box-shadow:var(--shadow-deep)}\n  .btn-grad .arr{background:rgba(255,255,255,.22);color:#fff}\n  .btn-grad:hover{box-shadow:0 32px 70px -20px rgba(14,37,137,.75)}\n\n  .btn-ghost{background:transparent;color:#fff;border:1.5px solid var(--on-dark-line);padding:0 28px}\n  .btn-ghost:hover{background:rgba(255,255,255,.06);border-color:var(--cyan)}\n\n  .btn-light{background:var(--white);color:var(--ink);padding:0 8px 0 24px}\n  .btn-light .arr{background:var(--ink);color:#fff}\n  .btn-light:hover{background:var(--cyan)}\n\n  .btn-wsp{background:var(--wsp);color:#fff;box-shadow:0 18px 38px -12px rgba(18,140,126,.55)}\n  .btn-wsp .arr{background:#fff;color:var(--wsp-dark)}\n  .btn-wsp:hover{background:#1ebe5a}\n\n  /* ============================================================\n     NAV — dark sticky, blur, brand left, links centro, CTA grad\n     ============================================================ */\n  .nav-shell{position:sticky;top:0;z-index:60;background:rgba(15,18,22,.78);backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid var(--on-dark-line)}\n  .nav{display:flex;align-items:center;justify-content:space-between;padding:18px 0;gap:18px}\n  .brand{display:flex;align-items:center;gap:12px}\n  .brand img{height:42px;width:auto;display:block;filter:brightness(1) drop-shadow(0 2px 4px rgba(34,190,214,.2))}\n  .brand-text{display:flex;flex-direction:column;line-height:1.05;gap:3px}\n  .brand-text .name{font-family:var(--display);font-weight:800;font-size:20px;color:#fff;letter-spacing:-0.03em;line-height:1}\n  .brand-text .role{font-family:var(--body);font-size:9.5px;letter-spacing:.2em;color:var(--on-dark-3);text-transform:uppercase;font-weight:600;line-height:1}\n  .nav-links{display:flex;gap:2px}\n  .nav-links a{padding:10px 16px;font-size:14px;color:var(--on-dark-2);font-weight:600;border-radius:999px;transition:color .15s, background .15s}\n  .nav-links a:hover{color:#fff;background:rgba(255,255,255,.04)}\n  .nav-links a.active{color:var(--cyan)}\n  .nav-right{display:flex;align-items:center;gap:14px}\n  .nav-phone{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--on-dark-1);font-weight:600}\n  .nav-phone .ico{width:32px;height:32px;border-radius:50%;background:rgba(34,190,214,.12);color:var(--cyan);display:grid;place-items:center}\n  .nav-cta{display:inline-flex;align-items:center;gap:8px;background:var(--grad-brand-h);color:#fff;padding:0 8px 0 22px;height:46px;border-radius:999px;font-size:14px;font-weight:600;transition:transform .15s}\n  .nav-cta:hover{transform:translateY(-1px)}\n  .nav-cta .arr{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.22);color:#fff;display:grid;place-items:center;transition:transform .2s}\n  .nav-cta:hover .arr{transform:rotate(-45deg)}\n\n  /* ============================================================\n     HERO — dark canvas, white card flotante + brand grad stats card\n     ============================================================ */\n  .hero{padding:36px 0 80px;position:relative;overflow:hidden}\n  .hero::before{content:\"\";position:absolute;top:-100px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle, rgba(34,190,214,.12) 0%, transparent 70%);pointer-events:none}\n  .hero::after{content:\"\";position:absolute;bottom:-200px;left:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle, rgba(20,50,181,.12) 0%, transparent 70%);pointer-events:none}\n\n  .hero-card{position:relative;background:var(--white);color:var(--ink);border-radius:var(--r-lg);padding:48px 48px 36px;box-shadow:var(--shadow-card)}\n  .hero-top{display:grid;grid-template-columns:1.25fr 1fr;gap:48px;align-items:start;padding-bottom:28px}\n  .hero h1{font-family:var(--display);font-weight:700;font-size:clamp(48px,5.8vw,80px);line-height:1.0;letter-spacing:-0.035em;color:var(--ink);margin:18px 0 0}\n  .hero-right p{font-size:15.5px;color:var(--mute);line-height:1.55;margin:0 0 16px}\n  .hero-right p b{color:var(--ink);font-weight:600}\n\n  .pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}\n  .pill{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border:1.5px solid var(--line);background:#fff;border-radius:999px;font-size:13px;color:var(--ink);font-weight:600;font-family:var(--body)}\n  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--blue)}\n  .pill.active{background:var(--cyan-soft);border-color:var(--cyan-2);color:var(--deep-2)}\n\n  .hero-bottom{position:relative;border-radius:var(--r-md);overflow:hidden;height:480px}\n  .hero-photo{position:absolute;inset:0;background:\n    radial-gradient(70% 50% at 65% 30%, oklch(58% 0.05 240) 0%, transparent 60%),\n    radial-gradient(60% 50% at 30% 70%, oklch(38% 0.05 230) 0%, transparent 65%),\n    repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 2px, transparent 2px 26px),\n    linear-gradient(180deg, oklch(42% 0.04 240) 0%, oklch(18% 0.03 240) 100%)}\n  .hero-photo::before{content:\"\";position:absolute;inset:0;background:\n    radial-gradient(ellipse 100px 50px at 40% 60%, oklch(64% 0.18 55) 0%, transparent 70%),\n    radial-gradient(ellipse 80px 40px at 55% 64%, oklch(64% 0.18 55) 0%, transparent 70%),\n    radial-gradient(ellipse 90px 45px at 70% 62%, oklch(64% 0.18 55) 0%, transparent 70%);\n    mix-blend-mode:screen;opacity:.6}\n  .hero-photo::after{content:\"\";position:absolute;inset:0;background:\n    linear-gradient(105deg, rgba(20,50,181,.4) 0%, rgba(20,50,181,.1) 50%, transparent 80%),\n    linear-gradient(180deg, transparent 30%, rgba(15,18,22,.7) 100%)}\n  .hero-grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);background-size:60px 60px;mix-blend-mode:overlay;pointer-events:none}\n\n  .photo-tag{position:absolute;left:24px;bottom:24px;font-family:var(--body);font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.16);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);padding:9px 14px;border-radius:8px;display:flex;align-items:center;gap:10px}\n  .photo-tag .live{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 4px rgba(34,190,214,.3);animation:pulse 2s infinite}\n  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,190,214,.4)}70%{box-shadow:0 0 0 12px rgba(34,190,214,0)}100%{box-shadow:0 0 0 0 rgba(34,190,214,0)}}\n\n  .play-btn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,.14);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.3);display:grid;place-items:center;color:#fff;cursor:pointer;transition:background .2s, transform .2s;z-index:2}\n  .play-btn:hover{background:rgba(255,255,255,.22);transform:translate(-50%,-50%) scale(1.05)}\n  .play-btn .inner{width:58px;height:58px;border-radius:50%;background:var(--grad-brand-h);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow-deep)}\n\n  .stats-card{position:absolute;right:24px;top:24px;background:var(--grad-brand);color:#fff;border-radius:var(--r-md);width:240px;box-shadow:var(--shadow-deep);overflow:hidden}\n  .stats-card::before{content:\"\";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.18);pointer-events:none}\n  .stats-card .ico-deco{position:absolute;left:18px;top:14px;color:rgba(255,255,255,.6)}\n  .stat-row{padding:22px 26px;border-bottom:1px solid rgba(255,255,255,.18);position:relative}\n  .stat-row:last-child{border-bottom:none}\n  .stat-row .n{font-family:var(--display);font-weight:800;font-size:32px;line-height:1;letter-spacing:-0.04em}\n  .stat-row .n sup{font-size:18px;font-weight:700;vertical-align:super}\n  .stat-row .l{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}\n\n  /* ============================================================\n     EMPRESAS BAND (dark)\n     ============================================================ */\n  .empresas-band{padding:44px 0;border-top:1px solid var(--on-dark-line);border-bottom:1px solid var(--on-dark-line);margin-bottom:0}\n  .empresas-row{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}\n  .empresas-label{font-family:var(--body);font-size:11.5px;font-weight:700;color:var(--on-dark-3);text-transform:uppercase;letter-spacing:.18em;display:flex;align-items:center;gap:14px}\n  .empresas-label::before{content:\"\";width:24px;height:2px;background:var(--grad-brand-flat)}\n  .empresas-logos{display:flex;align-items:center;gap:42px;flex-wrap:wrap}\n  .emp-logo{font-family:var(--display);font-weight:700;font-size:19px;color:var(--on-dark-2);letter-spacing:-0.02em;transition:color .2s;line-height:1.1}\n  .emp-logo:hover{color:#fff}\n  .emp-logo em{font-style:normal;background:var(--grad-brand-h);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}\n  .emp-logo small{display:block;font-family:var(--body);font-size:9.5px;letter-spacing:.18em;color:var(--on-dark-4);font-weight:600;margin-top:3px;text-transform:uppercase}\n\n  /* ============================================================\n     SECTIONS — generic\n     ============================================================ */\n  section.block{padding:100px 0;position:relative}\n  .sec-head{display:grid;grid-template-columns:1.05fr 0.95fr;gap:48px;align-items:end;margin-bottom:56px}\n  .sec-head h2{font-family:var(--display);font-weight:700;font-size:clamp(36px,4.4vw,56px);line-height:1.04;letter-spacing:-0.03em;color:#fff;margin:14px 0 0}\n  .sec-head .right{padding-bottom:6px;display:flex;flex-direction:column;align-items:flex-end;gap:20px}\n  .sec-head .right p{font-size:15.5px;color:var(--on-dark-2);max-width:44ch;line-height:1.55;margin:0;text-align:right}\n\n  /* ============================================================\n     NOSOTROS — V4 style: dark with giant brand mark + spec cards\n     ============================================================ */\n  .nosotros-block{padding:120px 0 100px}\n  .nosotros-head{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-bottom:48px}\n  .nosotros-head .left p{font-size:16.5px;color:var(--on-dark-2);max-width:48ch;line-height:1.6;margin:14px 0 0}\n  .nosotros-head .left p b{color:#fff;font-weight:600}\n  .nosotros-head .right{padding-top:14px;display:flex;flex-direction:column;gap:14px;align-items:flex-end}\n  .meta-row{display:flex;align-items:center;gap:12px;font-family:var(--body);font-size:11px;font-weight:700;color:var(--on-dark-3);text-transform:uppercase;letter-spacing:.18em}\n  .meta-row .sep{width:24px;height:1px;background:var(--on-dark-line)}\n  .meta-row .brand-acc{background:var(--grad-brand-h);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}\n\n  .nosotros-feature{position:relative;display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:center;padding:48px 56px;background:var(--ink-2);border:1px solid var(--ink-line);border-radius:var(--r-lg);overflow:hidden}\n  .nosotros-feature::before{content:\"\";position:absolute;top:-100px;right:-100px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle, rgba(34,190,214,.10) 0%, transparent 70%);pointer-events:none}\n\n  .nosotros-mark{position:relative;height:420px;display:flex;align-items:center;justify-content:center}\n  .nosotros-mark .ring{position:absolute;inset:0;display:grid;place-items:center}\n  .nosotros-mark .ring::before{content:\"\";width:420px;height:420px;border-radius:50%;border:1.5px dashed var(--on-dark-line)}\n  .nosotros-mark .ring::after{content:\"\";position:absolute;width:280px;height:280px;border-radius:50%;border:1px dashed var(--ink-line-2)}\n  .nosotros-mark img{position:relative;width:260px;height:260px;object-fit:contain;z-index:2;filter:drop-shadow(0 30px 60px rgba(20,50,181,.45))}\n  .nosotros-mark .spec{position:absolute;background:var(--ink-3);border:1px solid var(--ink-line);border-radius:var(--r-sm);padding:12px 16px;z-index:3;backdrop-filter:blur(8px)}\n  .nosotros-mark .spec .k{font-size:10px;font-weight:700;color:var(--on-dark-3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px}\n  .nosotros-mark .spec .v{font-family:var(--display);font-weight:700;font-size:15px;color:#fff;letter-spacing:-0.015em;line-height:1.15}\n  .nosotros-mark .spec .v .grad{background:var(--grad-brand-h);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}\n  .nosotros-mark .spec.a{left:-10px;top:30px}\n  .nosotros-mark .spec.b{right:-10px;top:80px}\n  .nosotros-mark .spec.c{left:0;bottom:50px}\n  .nosotros-mark .spec.d{right:0;bottom:30px;background:var(--grad-brand-h);border-color:transparent}\n  .nosotros-mark .spec.d .k{color:rgba(255,255,255,.7)}\n  .nosotros-mark .spec.d .v{color:#fff}\n\n  .nosotros-content{padding:0}\n  .nosotros-content .quote{font-family:var(--display);font-weight:400;font-size:24px;line-height:1.3;letter-spacing:-0.015em;color:#fff;margin:0 0 24px}\n  .nosotros-content .quote::before{content:\"\\201C\";color:var(--cyan);margin-right:4px;font-family:var(--display)}\n  .nosotros-content .quote::after{content:\"\\201D\";color:var(--cyan);margin-left:2px;font-family:var(--display)}\n  .nosotros-content p{font-size:15px;color:var(--on-dark-2);line-height:1.6;margin:0 0 16px;max-width:42ch}\n  .nosotros-content p b{color:#fff;font-weight:600}\n  .nosotros-content .link-mission{display:inline-flex;align-items:center;gap:12px;color:var(--cyan);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.1em;margin-top:8px}\n  .nosotros-content .link-mission .arr{width:34px;height:34px;border-radius:50%;background:var(--grad-brand-h);color:#fff;display:grid;place-items:center;transition:transform .2s}\n  .nosotros-content .link-mission:hover .arr{transform:rotate(-45deg)}\n\n  /* ============================================================\n     SERVI
