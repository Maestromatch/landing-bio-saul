<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúl el Constructor | Construcción & Mantención Santiago</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="description" content="Especialistas en construcción de casas, remodelaciones y mantención express en Santiago RM. Proyectos premium y garantizados.">
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="c">C</span><span class="s">S</span>
            </div>
            <h1>Saúl el Constructor</h1>
            <p class="tagline">Construcción & Mantención Profesional</p>
        </header>

        <main>
            <a href="javascript:void(0)" onclick="trackLead('Cotización General', '56942657719', 'Hola Saúl, vengo de Instagram y necesito una cotización inmediata.')" class="btn btn-primary animate-pop">
                <div class="icon">🟢</div>
                <div class="text">
                    <strong>¡Cotiza por WhatsApp!</strong>
                    <span>Respuesta inmediata</span>
                </div>
            </a>

            <a href="javascript:void(0)" onclick="trackLead('Mantención Deptos', '56942657719', 'Hola Saúl, me interesa la Mantención Express para un departamento.')" class="btn btn-glass">
                <div class="icon">🏙️</div>
                <div class="text">
                    <strong>Mantención Express Deptos</strong>
                    <span>Santiago RM</span>
                </div>
            </a>

            <a href="javascript:void(0)" onclick="trackLead('Construcción Casas', '56942657719', 'Hola Saúl, quiero información sobre la construcción de casas.')" class="btn btn-glass">
                <div class="icon">🏠</div>
                <div class="text">
                    <strong>Construcción de Casas</strong>
                    <span>Madera & Panel SIP</span>
                </div>
            </a>

            <a href="https://www.tiktok.com/@constructorsaul" class="btn btn-glass">
                <div class="icon">📱</div>
                <div class="text">
                    <strong>Sígueme en TikTok</strong>
                    <span>Mira nuestras obras</span>
                </div>
            </a>
        </main>

        <footer>
            <p>&copy; 2026 @saul_el_constructor | Santiago, Chile</p>
        </footer>
    </div>

    <script>
        function trackLead(servicio, phone, message) {
            const webhookUrl = "https://saaul.app.n8n.cloud/webhook-test/lead-capture"; 
            const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            
            // Enviamos el lead a n8n en segundo plano
            fetch(webhookUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    servicio: servicio,
                    fecha: new Date().toISOString(),
                    origen: 'Instagram Bio'
                })
            });

            // Redirigimos a WhatsApp inmediatamente
            setTimeout(() => {
                window.location.href = waUrl;
            }, 100);
        }
    </script>
</body>
</html>
